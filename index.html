            { id: "p21_13", name: "萊爾富溪州", lat: 23.8325486, lng: 120.4689421, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef:false, is2021:true, parking: "低", night_wait:"否", type: "觀察點", note: "跨越濁水溪最後節點。" },
            { id: "p21_14", name: "西螺森活武樹公園", lat: 23.8057749, lng: 120.4572697, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef:false, is2021:true, parking: "高", night_wait:"是", type: "停車點", note: "下大橋後避車休息空間。" },
            { id: "p21_15", name: "西螺延平老街免費停車場", lat: 23.8038846, lng: 120.461831, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef:false, is2021:true, parking: "高", night_wait:"是", type: "核心接駕點", note: "西螺區最穩定長停點，強烈建議利用。" },
            { id: "p21_16", name: "西螺福興宮", lat: 23.8016276, lng: 120.4605212, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef:false, is2021:true, parking: "低", night_wait:"否", type: "歷年參考點", note: "廟前交管嚴格，請停外圍。" },
            { id: "p21_17", name: "虎尾木棉花道", lat: 23.7289626, lng: 120.4391716, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef:false, is2021:true, parking: "中", night_wait:"否", type: "觀察點", note: "進虎尾市區前美麗路段可短停。" },
            { id: "p21_18", name: "安溪社區活動中心", lat: 23.719934, lng: 120.441116, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef:false, is2021:true, parking: "中", night_wait:"否", type: "停車點", note: "避開擁擠便於撤離的戰略點。" },
            { id: "p21_19", name: "虎尾驛", lat: 23.7041765, lng: 120.4363629, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef:false, is2021:true, parking: "低", night_wait:"否", type: "核心接駕點", note: "開車族請停於虎尾農工或周邊。" },
            { id: "p21_20", name: "全聯土庫中華店", lat: 23.6720272, lng: 120.3887702, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef:false, is2021:true, parking: "中", night_wait:"是", type: "觀察點", note: "土庫圓環外補給點。" },
            { id: "p21_21", name: "元長鄉停一停車場", lat: 23.651147, lng: 120.3133899, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef:false, is2021:true, parking: "高", night_wait:"是", type: "停車點", note: "進北港前最後大型腹地。" }
        ];

        // 繪製 2026 建議觀察軌跡帶 (虛線)
        const routeCoords = [ [24.3486, 120.6224], [24.2678, 120.5746], [23.9592, 120.5739], [23.7082, 120.4433], [23.7153, 120.3138], [23.5681, 120.3019] ];
        L.polyline(routeCoords, { color: '#666', weight: 3, dashArray: '5, 5', opacity: 0.5 }).addTo(routeLineLayer);

        function toggleRoute() { 
            const chk = document.getElementById('toggle-route');
            if (chk) chk.checked ? map.addLayer(routeLineLayer) : map.removeLayer(routeLineLayer); 
        }

        // 生成數字圖示
        function getNumberMarkerIcon(tactical_group) {
            let num = 0, color = "#000";
            if (tactical_group.includes("第一晚")) { num = 1; color = "#436978"; }
            else if (tactical_group.includes("第二晚")) { num = 2; color = "#e3a800"; }
            else if (tactical_group.includes("前導")) { num = 3; color = "#9C2BCB"; }
            else if (tactical_group.includes("核心")) { num = 4; color = "#222"; }

            return L.divIcon({
                className: 'num-icon',
                html: `<div class="num-icon" style="background-color: ${color}; width:28px; height:28px;">${num}</div>`,
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
        }


	// ⬇️ 請新增這個函式：生成星號圖示 ⬇️
        function getStarMarkerIcon(colorName) {
            // 轉換對應的色碼
            const colorMap = { 'blue': '#2A81CB', 'orange': '#CB8427', 'red': '#CB2B3E', 'green': '#2AAD27' };
            const hexColor = colorMap[colorName] || '#222';

            return L.divIcon({
                className: 'star-icon',
                html: `<div class="star-icon" style="background-color: ${hexColor}; width:26px; height:26px;">★</div>`,
                iconSize: [26, 26],
                iconAnchor: [13, 13],
                popupAnchor: [0, -10]
            });
        }

        // 繪製交流道動態連線與生成獨立的交流道 marker
        function drawConnections(loc) {
            connLineLayer.clearLayers();
            if (loc.group === "2026候選區") {
                // 國1 交流道 (紅線)
                let g1Url = `https://www.google.com/maps/search/?api=1&query=${loc.nearest_g1_lat},${loc.nearest_g1_lng}`;
                L.polyline([[loc.lat, loc.lng], [loc.nearest_g1_lat, loc.nearest_g1_lng]], {color: 'red', weight: 3, opacity: 0.8, dashArray: '4,6'}).addTo(connLineLayer);
                let ic1Marker = L.marker([loc.nearest_g1_lat, loc.nearest_g1_lng], {icon: customIcon('red')}).bindPopup(`
                    <div class="custom-popup">
                        <h3 style="margin:0 0 5px 0;">${loc.nearest_g1_name}</h3>
                        <div style="font-size:0.8rem; color:#666;">(國道1號 示意節點)</div>
                        <a href="${g1Url}" target="_blank" class="gm-link-simple">go</a>
                    </div>
                `).addTo(connLineLayer);

                // 國3 交流道 (橘線)
                let g3Url = `https://www.google.com/maps/search/?api=1&query=${loc.nearest_g3_lat},${loc.nearest_g3_lng}`;
                L.polyline([[loc.lat, loc.lng], [loc.nearest_g3_lat, loc.nearest_g3_lng]], {color: 'orange', weight: 3, opacity: 0.8, dashArray: '4,6'}).addTo(connLineLayer);
                let ic3Marker = L.marker([loc.nearest_g3_lat, loc.nearest_g3_lng], {icon: customIcon('orange')}).bindPopup(`
                    <div class="custom-popup">
                        <h3 style="margin:0 0 5px 0;">${loc.nearest_g3_name}</h3>
                        <div style="font-size:0.8rem; color:#666;">(國道3號 示意節點)</div>
                        <a href="${g3Url}" target="_blank" class="gm-link-simple">go</a>
                    </div>
                `).addTo(connLineLayer);
            }
        }

        function focusMap(id) {
            const loc = locations.find(l => l.id === id);
            const marker = markerInstances[id];
            
            if (marker && loc) {
                if (loc.group === "2026候選區") {
                    drawConnections(loc);
                    let bounds = L.latLngBounds([
                        [loc.lat, loc.lng],
                        [loc.nearest_g1_lat, loc.nearest_g1_lng],
                        [loc.nearest_g3_lat, loc.nearest_g3_lng]
                    ]);
                    map.fitBounds(bounds, { paddingTopLeft: [0, 200], paddingBottomRight: [30, 30], maxZoom: 13, animate: true });
                } else {
                    connLineLayer.clearLayers();
                    map.setView([loc.lat, loc.lng], 14, { animate: true });
                    map.panBy([0, -100]); 
                }
                setTimeout(() => { marker.openPopup(); }, 300);
            }
        }

        function applyFilters() {
            markersLayer.clearLayers();
            connLineLayer.clearLayers();
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = '';
            const fVal = document.getElementById('filter-select').value;

            locations.forEach(loc => {
                let match = false;
                
                if (fVal === 'all') match = true;
                else if (fVal === '2026_only' && loc.group === '2026候選區') match = true;
                else if (fVal === 'ref_only' && loc.isRef) match = true;
                else if (fVal === '2021_only' && loc.is2021) match = true;
                else if (fVal === 'day1_2026' && loc.tactical_group === '第一晚候選') match = true;
                else if (fVal === 'day2_2026' && loc.tactical_group === '第二晚候選') match = true;
                else if (fVal === 'day3_2026' && loc.tactical_group === '第三晚候選') match = true;
                else if (fVal === 'target' && loc.day === 'target') match = true;
                else if (fVal === 'day1_2021' && loc.tactical_group === '第一晚停車點') match = true;
                else if (fVal === 'day2_2021' && loc.tactical_group === '第二晚停車點') match = true;
                else if (fVal === 'day3_pre_2021' && loc.tactical_group === '第三晚前導停車點') match = true;
                else if (fVal === 'day3_core_2021' && loc.tactical_group === '第三晚核心停車點') match = true;
                else if (fVal === 'func_parking_high' && loc.parking === '高') match = true;
                else if (fVal === 'func_night_yes' && loc.night_wait === '是') match = true;
                else if (fVal === 'func_watch' && loc.type.includes('觀察')) match = true;
                else if (fVal === 'func_candidate' && (loc.type.includes('駐駕') || loc.type.includes('核心'))) match = true;
                
                if (match) {
                    let icon;
                    if (loc.is2021) {
                        icon = getNumberMarkerIcon(loc.tactical_group);
                    } else if (loc.isRef) {
                        icon = getStarMarkerIcon(loc.color); // 歷年參考點用星號
                    } else {
                        icon = customIcon(loc.color);
                    }
                    const marker = L.marker([loc.lat, loc.lng], {icon: icon}).bindPopup(generatePopupContent(loc));

                    marker.on('click', () => { focusMap(loc.id); });

                    markersLayer.addLayer(marker);
                    markerInstances[loc.id] = marker;

                    let iconStr = loc.isRef ? "★" : (loc.is2021 ? "🅿️" : (loc.day === 'target' ? "🎯" : "📍"));
                    let li = document.createElement('li');
                    li.className = 'list-item';
                    li.onclick = () => { focusMap(loc.id); };
                    
                    li.innerHTML = `
                        <div class="list-item-title">${iconStr} ${loc.name}</div>
                        <div class="list-item-desc" style="color:#d92727; font-weight:bold;">[${loc.tactical_group}]</div>
                        <div class="list-item-desc">🅿️停車便利:${loc.parking} | 屬性:${loc.type}</div>
                    `;
                    listContainer.appendChild(li);
                }
            });
        }

        function generatePopupContent(loc) {
            let parkingBadge = loc.parking === "高" ? "parking-high" : (loc.parking === "中" ? "parking-med" : "parking-low");
            let yearTag = loc.is2021 ? "2021 紀錄" : (loc.isRef ? "歷年紀錄" : "2026 推估");
            let gMapUrl = `https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}`;
            
            let html = `
                <div class="custom-popup">
                    <div class="popup-year">${yearTag}</div>
                    <h3 class="popup-title">${loc.name}</h3>
                    <div class="badges-container">
                        <span class="badge ${parkingBadge}">🅿️ 停車便利：${loc.parking}</span>
                        ${loc.night_wait === "是" ? `<span class="badge night-yes">🌙 夜宿可</span>` : ''}
                    </div>
            `;
            
            if (loc.group === "2026候選區") {
                html += `
                    <div class="highway-info">
                        <span style="display:block; margin-bottom:3px;">※ 以下距離為規劃示意值</span>
                        <b>國1：</b>${loc.nearest_g1_name} (${loc.nearest_g1_distance})<br>
                        <b>國3：</b>${loc.nearest_g3_name} (${loc.nearest_g3_distance})
                    </div>
                `;
            }
            
            html += `
                <div class="note">${loc.note}</div>
                <a href="${gMapUrl}" target="_blank" class="gm-link-simple">go</a>
                </div>
            `;
            return html;
        }

        applyFilters();

    </script>
</body>
</html>
