<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白沙屯媽祖 2026 去程候選駐駕地圖（開車接駕版）</title>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* 基本重置與字體 */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #f4f4f9; }
        
        /* 頂部標題 */
        #header { background: #d92727; color: white; padding: 12px 15px; text-align: center; flex-shrink: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #header h1 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
        #header p { margin: 5px 0 0 0; font-size: 0.85rem; color: #ffe6e6; font-weight: bold; }

        /* 主要內容區塊 (Flexbox) */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        /* 左側控制面板 */
        #sidebar { width: 340px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ccc; z-index: 500; }
        .sidebar-section { padding: 15px; border-bottom: 1px solid #eee; }
        .sidebar-section h2 { font-size: 1.1rem; margin: 0 0 10px 0; color: #333; display: flex; align-items: center; }
        .sidebar-section h2::before { content: "🚙"; margin-right: 5px; }
        
        /* 戰略與警語區塊 */
        .info-box { background: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; font-size: 0.9rem; color: #664d03; margin-bottom: 10px; border-radius: 0 4px 4px 0; }
        .strategy-list { margin: 0; padding-left: 20px; font-size: 0.9rem; color: #555; }
        .strategy-list li { margin-bottom: 5px; }

        /* 篩選控制器 */
        .control-group { margin-bottom: 10px; }
        .control-group label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.95rem; }
        .checkbox-group { display: flex; align-items: center; font-size: 0.9rem; color: #333; margin-top: 8px; cursor: pointer; }
        .checkbox-group input { margin-right: 8px; cursor: pointer; }

        /* 地點列表區塊 */
        #list-container { flex: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; background: #fafafa; }
        .list-item { padding: 12px 15px; border-bottom: 1px solid #eaeaea; cursor: pointer; transition: background 0.2s; }
        .list-item:hover { background: #eef5ff; }
        .list-item-title { font-weight: bold; font-size: 1.05rem; color: #222; margin-bottom: 5px; }
        .list-item-desc { font-size: 0.85rem; color: #666; }

        /* 地圖區塊 */
        #map { flex: 1; height: 100%; z-index: 1; }

        /* 徽章 (Badges) */
        .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; margin-bottom: 5px; color: white; }
        .badge.parking-high { background: #28a745; }
        .badge.parking-med { background: #ffc107; color: #333; }
        .badge.night-yes { background: #17a2b8; }
        .badge.type-watch { background: #6c757d; }
        .badge.type-stay { background: #dc3545; }

        /* Popup 內容樣式 */
        .custom-popup .popup-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 5px 0; color: #222; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .custom-popup .popup-row { font-size: 0.9rem; margin: 5px 0; display: flex; align-items: flex-start; }
        .custom-popup .popup-row span.label { color: #666; width: 65px; flex-shrink: 0; font-weight: bold; }
        .custom-popup .badges-container { margin-top: 8px; margin-bottom: 8px; }
        .custom-popup .note { background: #f9f9f9; border-left: 3px solid #007bff; padding: 5px 8px; font-size: 0.85rem; color: #444; margin-top: 10px; }

        /* 圖例 (Legend) */
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.2); font-size: 0.85rem; line-height: 1.5; color: #333; }
        .legend i { width: 14px; height: 14px; display: inline-block; margin-right: 5px; border-radius: 50%; vertical-align: middle; }

        /* RWD 手機版調整 */
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; flex: none; max-height: 40vh; border-right: none; border-bottom: 2px solid #ccc; }
            #map { flex: 1; min-height: 50vh; }
            .info-box { display: none; /* 手機版隱藏較長的戰略文案以節省空間 */ }
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>白沙屯媽祖 2026 去程候選駐駕地圖（開車接駕版）</h1>
        <p>⚠️ 規劃示意圖：非官方定案，實際請依媽祖即時路線與現場交管為準</p>
    </div>

    <div id="main-container">
        <!-- 左側控制面板 -->
        <div id="sidebar">
            <div class="sidebar-section" style="padding-bottom: 5px;">
                <div class="info-box">
                    <strong>📌 開車族重點提醒：</strong><br>
                    部分停車與交流道資訊為「規劃示意值」，請優先選可停車且便於撤離的外圍位置，切勿將狹窄鄉道當作長期駐點。
                </div>
                <h2>建議接駕優先觀察順序</h2>
                <ol class="strategy-list">
                    <li><strong>第一順位：</strong>褒忠／虎尾帶 (第三晚戰略價值高)</li>
                    <li><strong>第二順位：</strong>員林／花壇帶 (中段預判)</li>
                    <li><strong>第三順位：</strong>清水／沙鹿帶 (視起駕時間機動)</li>
                </ol>
            </div>

            <div class="sidebar-section" style="background: #fdfdfd;">
                <div class="control-group">
                    <label for="filter-select">🔍 快速篩選地點：</label>
                    <select id="filter-select" onchange="applyFilters()">
                        <option value="all">顯示全部</option>
                        <option value="day1">🔵 只看 第一晚候選區</option>
                        <option value="day2">🟠 只看 第二晚候選區</option>
                        <option value="day3">🔴 只看 第三晚候選區</option>
                        <option value="target">🎯 只看 目標點 (北港)</option>
                        <option value="high-parking">🅿️ 只看 停車便利度：高</option>
                        <option value="night-wait">🌙 只看 適合夜間等候</option>
                        <option value="type-watch">👀 只看 屬性：純觀察區塊</option>
                        <option value="type-stay">🏠 只看 屬性：駐駕參考/候選</option>
                    </select>
                </div>
                <label class="checkbox-group">
                    <input type="checkbox" id="toggle-ref" checked onchange="applyFilters()"> 顯示歷年實際駐駕參考點 (⭐)
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="toggle-route" checked onchange="toggleRoute()"> 顯示建議觀察軌跡帶 (虛線)
                </label>
            </div>

            <!-- 動態生成的地點列表 -->
            <ul id="list-container"></ul>
        </div>

        <!-- 地圖容器 -->
        <div id="map"></div>
    </div>

    <!-- 引入 Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. 初始化地圖 ---
        const map = L.map('map').setView([23.95, 120.45], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- 2. 自定義 Marker 顏色圖標 ---
        const customIcon = (color) => new L.Icon({
            iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        // 圖層群組管理
        const markersLayer = L.featureGroup().addTo(map);
        let routeLineLayer = null;

        // 儲存 marker 實例，方便點擊列表時觸發 popup
        const markerInstances = {};

        // --- 3. 擴充後的資料點 (加入開車族欄位，部分為示意值) ---
        const locations = [
            // 第一晚 (藍色)
            { id: "p1", name: "大甲區 (行政中心)", lat: 24.3486, lng: 120.6224, group: "第一晚候選", day: "day1", color: "blue", isRef: false,
              parking: "高", interchange: "國三 大甲交流道 約10分", night_wait: "是", type: "純觀察區塊", note: "腹地較廣，適合外圍停車後步行切入路線。" },
            { id: "p2", name: "清水區 (行政中心)", lat: 24.2678, lng: 120.5746, group: "第一晚候選", day: "day1", color: "blue", isRef: false,
              parking: "中", interchange: "國四 清水端 約10分", night_wait: "是", type: "純觀察區塊", note: "市區街道易擁擠，建議提早於台1線周邊尋找空地。" },
            { id: "p3", name: "沙鹿區 (行政中心)", lat: 24.2332, lng: 120.5624, group: "第一晚候選", day: "day1", color: "blue", isRef: false,
              parking: "低", interchange: "國三 沙鹿交流道 約15分", night_wait: "否", type: "純觀察區塊", note: "沙鹿市區道路狹小，開車族強烈建議避開中心點停放。" },
            { id: "p4", name: "福宴國際創意美食餐廳", lat: 24.2709, lng: 120.5644, group: "第一晚參考點", day: "day1", color: "blue", isRef: true,
              parking: "高", interchange: "台1線旁", night_wait: "是", type: "駐駕參考點", note: "2020實際駐駕點，具備大型停車空間，戰略價值高。" },
            
            // 第二晚 (橘色)
            { id: "p5", name: "花壇鄉 (行政中心)", lat: 24.0255, lng: 120.5393, group: "第二晚候選", day: "day2", color: "orange", isRef: false,
              parking: "中", interchange: "台74甲線 周邊銜接", night_wait: "是", type: "純觀察區塊", note: "台1線沿路多腹地，但進香車隊多，需注意臨停安全。" },
            { id: "p6", name: "員林市 (行政中心)", lat: 23.9592, lng: 120.5739, group: "第二晚候選", day: "day2", color: "orange", isRef: false,
              parking: "中", interchange: "台76線 員林交流道 約15分", night_wait: "是", type: "駐駕候選", note: "生活機能極佳，夜間等候首選，但市區內停車位需提早卡位。" },
            { id: "p7", name: "宏泰汽車商行", lat: 23.9782, lng: 120.5518, group: "第二晚參考點", day: "day2", color: "orange", isRef: true,
              parking: "低", interchange: "近台1線", night_wait: "否", type: "駐駕參考點", note: "2020駐駕點。此為路邊商行示意座標，開車接駕不宜直接停靠門口。" },
            
            // 第三晚 (紅色)
            { id: "p8", name: "虎尾鎮 (行政中心)", lat: 23.7082, lng: 120.4433, group: "第三晚候選", day: "day3", color: "red", isRef: false,
              parking: "高", interchange: "國一 虎尾交流道 約10分", night_wait: "是", type: "駐駕候選", note: "雲林重要樞紐，撤離動線多，極適合開車族部署。" },
            { id: "p9", name: "土庫鎮 (行政中心)", lat: 23.6766, lng: 120.3925, group: "第三晚候選", day: "day3", color: "red", isRef: false,
              parking: "中", interchange: "台78線 土庫交流道 約5分", night_wait: "是", type: "純觀察區塊", note: "圓環周邊易打結，建議車停台78交流道附近空地。" },
            { id: "p10", name: "褒忠鄉 (行政中心)", lat: 23.7153, lng: 120.3138, group: "第三晚候選", day: "day3", color: "red", isRef: false,
              parking: "中", interchange: "台78線 元長交流道 約15分", night_wait: "否", type: "駐駕候選", note: "進北港前最後防線，鄉道窄，停車需非常謹慎。" },
            { id: "p11", name: "國立虎尾農工", lat: 23.7001, lng: 120.4357, group: "第三晚參考點", day: "day3", color: "red", isRef: true,
              parking: "高", interchange: "近虎尾市區", night_wait: "是", type: "駐駕參考點", note: "2020駐駕點。校園周邊重劃區路幅寬，極佳的夜宿觀察點。" },
            { id: "p12", name: "褒忠分駐所", lat: 23.7145, lng: 120.3121, group: "第三晚參考點", day: "day3", color: "red", isRef: true,
              parking: "低", interchange: "縣道周邊", night_wait: "否", type: "駐駕參考點", note: "2019駐駕點。警局周邊交管嚴格，純開車族建議遠離此點停放。" },
            
            // 目標點 (綠色/金色)
            { id: "p13", name: "北港朝天宮", lat: 23.5681, lng: 120.3019, group: "目標點", day: "target", color: "green", isRef: false,
              parking: "低", interchange: "台78 再轉 台19", night_wait: "是", type: "終點", note: "進香目的地。開車族請停放北港大橋南端或外圍付費停車場，勿入小鎮。" }
        ];

        // 繪製「建議觀察帶」虛線
        const routeCoords = [ [24.3486, 120.6224], [24.2678, 120.5746], [23.9592, 120.5739], [23.7082, 120.4433], [23.7153, 120.3138], [23.5681, 120.3019] ];
        function initRoute() {
            routeLineLayer = L.polyline(routeCoords, { color: '#888', weight: 5, dashArray: '10, 15', opacity: 0.6 })
                .bindPopup("<b>🚙 建議觀察軌跡帶</b><br>非絕對路線，僅表示大方向收斂趨勢，供開車切入參考。");
            map.addLayer(routeLineLayer);
        }

        function toggleRoute() {
            if (document.getElementById('toggle-route').checked) {
                map.addLayer(routeLineLayer);
            } else {
                map.removeLayer(routeLineLayer);
            }
        }

        // --- 4. 生成 Popup HTML 模板 ---
        function generatePopupContent(loc) {
            let iconStr = loc.isRef ? "⭐" : (loc.day === 'target' ? "🎯" : "📍");
            let parkingBadge = loc.parking === "高" ? "parking-high" : (loc.parking === "中" ? "parking-med" : "");
            let nightBadge = loc.night_wait === "是" ? "night-yes" : "";
            let typeBadge = loc.type.includes("觀察") ? "type-watch" : "type-stay";

            return `
                <div class="custom-popup">
                    <h3 class="popup-title">${iconStr} ${loc.name}</h3>
                    <div class="badges-container">
                        ${loc.parking === "高" ? `<span class="badge parking-high">🅿️ 停車方便</span>` : ''}
                        ${loc.night_wait === "是" ? `<span class="badge night-yes">🌙 適合夜宿</span>` : ''}
                        <span class="badge ${typeBadge}">${loc.type}</span>
                    </div>
                    <div class="popup-row"><span class="label">分類區塊:</span> ${loc.group}</div>
                    <div class="popup-row"><span class="label">停車難易:</span> 便利度 ${loc.parking}</div>
                    <div class="popup-row"><span class="label">建議交流:</span> ${loc.interchange}</div>
                    <div class="note"><b>💡 備註：</b>${loc.note}</div>
                </div>
            `;
        }

        // 點擊列表項目時，地圖飛轉並打開 Popup
        function focusMap(id) {
            const marker = markerInstances[id];
            if (marker) {
                map.setView(marker.getLatLng(), 14, { animate: true });
                marker.openPopup();
            }
        }

        // --- 5. 核心渲染邏輯 (結合篩選) ---
        function applyFilters() {
            markersLayer.clearLayers();
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = '';

            const filterVal = document.getElementById('filter-select').value;
            const showRef = document.getElementById('toggle-ref').checked;

            locations.forEach(loc => {
                // 過濾歷年參考點
                if (!showRef && loc.isRef) return;

                // 條件過濾
                let match = false;
                if (filterVal === 'all') match = true;
                else if (['day1', 'day2', 'day3', 'target'].includes(filterVal) && loc.day === filterVal) match = true;
                else if (filterVal === 'high-parking' && loc.parking === '高') match = true;
                else if (filterVal === 'night-wait' && loc.night_wait === '是') match = true;
                else if (filterVal === 'type-watch' && loc.type.includes("觀察")) match = true;
                else if (filterVal === 'type-stay' && loc.type.includes("駐駕")) match = true;

                if (match) {
                    // 加入地圖 Marker
                    const marker = L.marker([loc.lat, loc.lng], { icon: customIcon(loc.color) })
                        .bindPopup(generatePopupContent(loc));
                    markersLayer.addLayer(marker);
                    markerInstances[loc.id] = marker;

                    // 加入側邊列表
                    let iconStr = loc.isRef ? "⭐" : (loc.day === 'target' ? "🎯" : "📍");
                    let li = document.createElement('li');
                    li.className = 'list-item';
                    li.onclick = () => focusMap(loc.id);
                    li.innerHTML = `
                        <div class="list-item-title">${iconStr} ${loc.name}</div>
                        <div class="list-item-desc">
                            ${loc.group} | 🅿️ ${loc.parking} | 屬性: ${loc.type}
                        </div>
                    `;
                    listContainer.appendChild(li);
                }
            });
        }

        // --- 6. 加入地圖圖例 (Legend) ---
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <b>顏色說明</b><br>
                <i style="background: #38AADD"></i> 第一晚 (台中海線)<br>
                <i style="background: #F69730"></i> 第二晚 (彰化南段)<br>
                <i style="background: #D63E2A"></i> 第三晚 (雲林前哨)<br>
                <i style="background: #72B026"></i> 目標點 (北港)<br>
                <hr style="margin:5px 0">
                📍 推估候選行政區<br>
                ⭐ 歷年實際參考點
            `;
            return div;
        };
        legend.addTo(map);

        // 初始化
        initRoute();
        applyFilters();

    </script>
</body>
</html>
