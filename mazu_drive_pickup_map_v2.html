            { id: "p21_19", name: "虎尾驛", lat: 23.7041765, lng: 120.4363629, group: "2021停車/觀察點", day: "2021", color: "violet", isRef: false, is2021: true, parking: "低", interchange: "2021路線軌跡", night_wait: "需確認", type: "歷史點位", note: "原標記: 4-3 1600 虎尾驛" },
            { id: "p21_20", name: "全聯 土庫中華店", lat: 23.6720272, lng: 120.3887702, group: "2021停車/觀察點", day: "2021", color: "violet", isRef: false, is2021: true, parking: "中", interchange: "2021路線軌跡", night_wait: "需確認", type: "歷史點位", note: "原標記: 4-3 1800 全聯福利中心" },
            { id: "p21_21", name: "元長鄉停一停車場", lat: 23.651147, lng: 120.3133899, group: "2021停車/觀察點", day: "2021", color: "violet", isRef: false, is2021: true, parking: "高", interchange: "2021路線軌跡", night_wait: "需確認", type: "歷史點位", note: "原標記: 05-01 0700 元長鄉停一停車場" },

            // ====== 目標點 (綠色) ======
            { id: "p13", name: "北港朝天宮", lat: 23.5681, lng: 120.3019, group: "目標點", day: "target", color: "green", isRef: false, is2021: false,
              parking: "低", interchange: "台78 再轉 台19", night_wait: "是", type: "終點", note: "目的地。開車族請停外圍付費停車場，勿入小鎮。" }
        ];

        // 繪製「建議觀察帶」虛線
        const routeCoords = [ [24.3486, 120.6224], [24.2678, 120.5746], [23.9592, 120.5739], [23.7082, 120.4433], [23.7153, 120.3138], [23.5681, 120.3019] ];
        function initRoute() {
            routeLineLayer = L.polyline(routeCoords, { color: '#888', weight: 5, dashArray: '10, 15', opacity: 0.6 })
                .bindPopup("<b>🚙 建議觀察軌跡帶</b><br>非絕對路線，僅表示大方向收斂趨勢，供開車切入參考。");
            map.addLayer(routeLineLayer);
        }

        function toggleRoute() {
            if (document.getElementById('toggle-route').checked) {
                map.addLayer(routeLineLayer);
            } else {
                map.removeLayer(routeLineLayer);
            }
        }

        // --- 4. 生成 Popup HTML 模板 ---
        function generatePopupContent(loc) {
            // 圖標判斷
            let iconStr = loc.is2021 ? "🟣" : (loc.isRef ? "⭐" : (loc.day === 'target' ? "🎯" : "📍"));
            
            // 徽章判斷
            let parkingBadge = loc.parking === "高" ? "parking-high" : (loc.parking === "中" ? "parking-med" : "parking-low");
            let nightBadge = loc.night_wait === "是" ? "night-yes" : "";
            let typeBadge = loc.is2021 ? "type-history" : (loc.type.includes("觀察") ? "type-watch" : "type-stay");

            return `
                <div class="custom-popup">
                    <h3 class="popup-title">${iconStr} ${loc.name}</h3>
                    <div class="badges-container">
                        <span class="badge ${parkingBadge}">🅿️ 停車${loc.parking}</span>
                        ${loc.night_wait === "是" ? `<span class="badge night-yes">🌙 適合夜宿</span>` : ''}
                        <span class="badge ${typeBadge}">${loc.type}</span>
                    </div>
                    <div class="popup-row"><span class="label">分類:</span> ${loc.group}</div>
                    <div class="popup-row"><span class="label">動線:</span> ${loc.interchange}</div>
                    <div class="note"><b>💡 備註：</b>${loc.note}</div>
                </div>
            `;
        }

        // 點擊列表項目時，地圖飛轉並打開 Popup
        function focusMap(id) {
            const marker = markerInstances[id];
            if (marker) {
                map.setView(marker.getLatLng(), 14, { animate: true });
                marker.openPopup();
            }
        }

        // --- 5. 核心渲染邏輯 (結合篩選) ---
        function applyFilters() {
            markersLayer.clearLayers();
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = '';

            const filterVal = document.getElementById('filter-select').value;
            const showRef = document.getElementById('toggle-ref').checked;
            const show2021 = document.getElementById('toggle-2021').checked;

            locations.forEach(loc => {
                // Checkbox 過濾器
                if (!showRef && loc.isRef) return;
                if (!show2021 && loc.is2021) return;

                // 下拉選單過濾條件
                let match = false;
                if (filterVal === 'all') match = true;
                else if (['day1', 'day2', 'day3', '2021', 'target'].includes(filterVal) && loc.day === filterVal) match = true;
                else if (filterVal === 'high-parking' && loc.parking === '高') match = true;
                else if (filterVal === 'night-wait' && loc.night_wait === '是') match = true;
                else if (filterVal === 'type-watch' && loc.type.includes("觀察")) match = true;
                else if (filterVal === 'type-stay' && loc.type.includes("駐駕")) match = true;

                if (match) {
                    // 加入地圖 Marker
                    const marker = L.marker([loc.lat, loc.lng], { icon: customIcon(loc.color) })
                        .bindPopup(generatePopupContent(loc));
                    markersLayer.addLayer(marker);
                    markerInstances[loc.id] = marker;

                    // 加入側邊列表
                    let iconStr = loc.is2021 ? "🟣" : (loc.isRef ? "⭐" : (loc.day === 'target' ? "🎯" : "📍"));
                    let li = document.createElement('li');
                    li.className = 'list-item';
                    li.onclick = () => focusMap(loc.id);
                    li.innerHTML = `
                        <div class="list-item-title">${iconStr} ${loc.name}</div>
                        <div class="list-item-desc">
                            ${loc.group} | 🅿️ ${loc.parking} | 屬性: ${loc.type}
                        </div>
                    `;
                    listContainer.appendChild(li);
                }
            });
        }

        // --- 6. 加入地圖圖例 (Legend) ---
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <b>群組顏色說明</b><br>
                <i style="background: #38AADD"></i> 第一晚候選<br>
                <i style="background: #F69730"></i> 第二晚候選<br>
                <i style="background: #D63E2A"></i> 第三晚候選<br>
                <i style="background: #CB8427"></i> <b>2021 歷史點 (紫)</b><br>
                <i style="background: #72B026"></i> 目標點 (北港)<br>
                <hr style="margin:5px 0">
                📍 推估候選區<br>
                ⭐ 歷年駐駕參考<br>
                🟣 2021 歷史點位
            `;
            return div;
        };
        legend.addTo(map);

        // 初始化
        initRoute();
        applyFilters();

    </script>
</body>
</html>
