            { id: "p21_10", name: "BMW汽車昌一展示中心", lat: 24.0394229, lng: 120.5356216, group: "2021停車點", tactical_group: "第二晚停車點", day: "day2_2021", color: "gold", isRef: false, is2021: true, parking: "中", interchange: "台1線路幅較寬處", night_wait: "需確認", type: "觀察點", note: "彰化往花壇方向，外側稍有空間可暫時觀察。" },

            { id: "p21_12", name: "北斗大菜市場", lat: 23.881188, lng: 120.5222917, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef: false, is2021: true, parking: "中", interchange: "近台1線/市區", night_wait: "需確認", type: "停車點", note: "南彰化重要集結點，市場周邊有停車空間。" },
            { id: "p21_13", name: "萊爾富溪州風鈴木道", lat: 23.8325486, lng: 120.4689421, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef: false, is2021: true, parking: "低", interchange: "台1線接西螺大橋前", night_wait: "否", type: "觀察點", note: "準備跨越濁水溪的最後節點。" },
            { id: "p21_14", name: "西螺森活武樹公園", lat: 23.8057749, lng: 120.4572697, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef: false, is2021: true, parking: "高", interchange: "過橋後腹地", night_wait: "是", type: "停車點", note: "下大橋後極佳的避車與休息空間。" },
            { id: "p21_15", name: "西螺延平老街免費停車場", lat: 23.8038846, lng: 120.461831, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef: false, is2021: true, parking: "高", interchange: "老街外圍動線", night_wait: "是", type: "核心接駕點", note: "西螺區最穩定的長停點，強烈建議開車族利用。" },
            { id: "p21_16", name: "西螺福興宮", lat: 23.8016276, lng: 120.4605212, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef: false, is2021: true, parking: "低", interchange: "市區動線核心", night_wait: "否", type: "歷年參考點", note: "廟前交管嚴格，請勿開車直闖，應停放於外圍。" },

            // 【第三晚核心停車點】(black 黑色)
            { id: "p21_17", name: "虎尾木棉花道", lat: 23.7289626, lng: 120.4391716, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef: false, is2021: true, parking: "中", interchange: "縣道145周邊", night_wait: "需確認", type: "觀察點", note: "進入虎尾市區前的美麗路段，可路邊短停。" },
            { id: "p21_18", name: "安溪社區活動中心", lat: 23.719934, lng: 120.441116, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef: false, is2021: true, parking: "中", interchange: "虎尾鎮外圍", night_wait: "需確認", type: "停車點", note: "避開市區擁擠，便於隨時撤離的戰略點。" },
            { id: "p21_19", name: "虎尾驛", lat: 23.7041765, lng: 120.4363629, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef: false, is2021: true, parking: "低", interchange: "虎尾市區中心", night_wait: "否", type: "核心接駕點", note: "歷史重要駐點，但開車族請停於虎尾農工或周邊重劃區。" },
            { id: "p21_20", name: "全聯 土庫中華店", lat: 23.6720272, lng: 120.3887702, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef: false, is2021: true, parking: "中", interchange: "縣道145/158", night_wait: "是", type: "觀察點", note: "土庫圓環外的補給點，具備短停機能。" },
            { id: "p21_21", name: "元長鄉停一停車場", lat: 23.651147, lng: 120.3133899, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef: false, is2021: true, parking: "高", interchange: "台19線前哨", night_wait: "需確認", type: "停車點", note: "進入北港前的最後大型停車接駁腹地。" }
        ];

        // --- 4. 繪製「建議觀察帶」虛線 ---
        const routeCoords = [ [24.3486, 120.6224], [24.2678, 120.5746], [23.9592, 120.5739], [23.7082, 120.4433], [23.7153, 120.3138], [23.5681, 120.3019] ];
        function initRoute() {
            routeLineLayer = L.polyline(routeCoords, { color: '#666', weight: 4, dashArray: '8, 12', opacity: 0.6 })
                .bindPopup("<b>🚙 2026 建議觀察軌跡帶</b><br>非絕對路線，僅表示大方向收斂趨勢。");
            map.addLayer(routeLineLayer);
        }

        function toggleRoute() {
            if (document.getElementById('toggle-route').checked) map.addLayer(routeLineLayer);
            else map.removeLayer(routeLineLayer);
        }

        // --- 5. 生成 Popup HTML 模板 ---
        function generatePopupContent(loc) {
            let iconStr = loc.isRef ? "⭐" : (loc.is2021 ? "🅿️" : (loc.day === 'target' ? "🎯" : "📍"));
            
            // 徽章樣式設定
            let parkingBadge = loc.parking === "高" ? "parking-high" : (loc.parking === "中" ? "parking-med" : "parking-low");
            let nightBadge = loc.night_wait === "是" ? "night-yes" : "";
            
            let typeBadge = "type-watch";
            if (loc.type.includes("核心")) typeBadge = "type-core";
            else if (loc.type.includes("駐車") || loc.type.includes("駐駕")) typeBadge = "type-stay";
            else if (loc.type.includes("停車")) typeBadge = "type-park";

            let yearTag = loc.is2021 ? "2021 紀錄" : (loc.isRef ? "歷年紀錄" : "2026 推估");

            return `
                <div class="custom-popup">
                    <div class="popup-header">
                        <span class="popup-year">${yearTag}</span>
                    </div>
                    <h3 class="popup-title">${iconStr} ${loc.name}</h3>
                    <div class="badges-container">
                        <span class="badge ${parkingBadge}">🅿️ 停車${loc.parking}</span>
                        ${loc.night_wait === "是" ? `<span class="badge night-yes">🌙 夜宿可</span>` : ''}
                        <span class="badge ${typeBadge}">${loc.type}</span>
                    </div>
                    <div class="popup-row"><span class="label">戰略層級:</span> ${loc.tactical_group}</div>
                    <div class="popup-row"><span class="label">動線接入:</span> ${loc.interchange}</div>
                    <div class="note"><b>💡 規劃提示：</b>${loc.note}</div>
                </div>
            `;
        }

        // 點擊列表項目時，地圖飛轉並打開 Popup
        function focusMap(id) {
            const marker = markerInstances[id];
            if (marker) {
                map.setView(marker.getLatLng(), 14, { animate: true });
                marker.openPopup();
            }
        }

        // 輔助函數：依照戰略分層給予列表標籤樣式
        function getTagClass(tactical_group) {
            if (tactical_group.includes("2026")) return "tag-2026";
            if (tactical_group.includes("歷年")) return "tag-ref";
            if (tactical_group.includes("第一晚停車")) return "tag-2021-1";
            if (tactical_group.includes("第二晚停車")) return "tag-2021-2";
            if (tactical_group.includes("前導")) return "tag-2021-3p";
            if (tactical_group.includes("核心")) return "tag-2021-3c";
            return "tag-2026";
        }

        // --- 6. 核心渲染邏輯 (結合高階篩選) ---
        function applyFilters() {
            markersLayer.clearLayers();
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = '';

            const filterVal = document.getElementById('filter-select').value;

            locations.forEach(loc => {
                let match = false;

                // 基本類別
                if (filterVal === 'all') match = true;
                else if (filterVal === '2026_only' && loc.group === '2026候選區') match = true;
                else if (filterVal === 'ref_only' && loc.isRef) match = true;
                else if (filterVal === '2021_only' && loc.is2021) match = true;
                
                // 進階分層 - 2026
                else if (filterVal === 'day1_2026' && loc.tactical_group === '第一晚候選') match = true;
                else if (filterVal === 'day2_2026' && loc.tactical_group === '第二晚候選') match = true;
                else if (filterVal === 'day3_2026' && loc.tactical_group === '第三晚候選') match = true;
                else if (filterVal === 'target' && loc.day === 'target') match = true;
                
                // 進階分層 - 2021
                else if (filterVal === 'day1_2021' && loc.tactical_group === '第一晚停車點') match = true;
                else if (filterVal === 'day2_2021' && loc.tactical_group === '第二晚停車點') match = true;
                else if (filterVal === 'day3_pre_2021' && loc.tactical_group === '第三晚前導停車點') match = true;
                else if (filterVal === 'day3_core_2021' && loc.tactical_group === '第三晚核心停車點') match = true;
                
                // 功能屬性
                else if (filterVal === 'func_parking_high' && loc.parking === '高') match = true;
                else if (filterVal === 'func_night_yes' && loc.night_wait === '是') match = true;
                else if (filterVal === 'func_watch' && loc.type.includes('觀察')) match = true;
                else if (filterVal === 'func_candidate' && (loc.type.includes('駐駕') || loc.type.includes('核心'))) match = true;

                if (match) {
                    // 加入地圖 Marker
                    const marker = L.marker([loc.lat, loc.lng], { icon: customIcon(loc.color) })
                        .bindPopup(generatePopupContent(loc));
                    markersLayer.addLayer(marker);
                    markerInstances[loc.id] = marker;

                    // 加入側邊列表 (加入標籤層次)
                    let iconStr = loc.isRef ? "⭐" : (loc.is2021 ? "🅿️" : (loc.day === 'target' ? "🎯" : "📍"));
                    let tagClass = getTagClass(loc.tactical_group);
                    
                    let li = document.createElement('li');
                    li.className = 'list-item';
                    li.onclick = () => focusMap(loc.id);
                    li.innerHTML = `
                        <div class="list-item-title"><span class="icon">${iconStr}</span> ${loc.name}</div>
                        <span class="list-item-tag ${tagClass}">[${loc.tactical_group}]</span>
                        <div class="list-item-desc">
                            🅿️停車: ${loc.parking} | 屬性: ${loc.type}
                        </div>
                    `;
                    listContainer.appendChild(li);
                }
            });
        }

        // --- 7. 加入高階地圖圖例 (Legend) ---
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>🎨 顏色 / 圖層說明</h4>
                <div class="grid">
                    <div><i class="color-box" style="background: #38AADD"></i>第一晚候選</div>
                    <div><i class="color-box" style="background: #436978"></i>21第一晚停車</div>
                    <div><i class="color-box" style="background: #F69730"></i>第二晚候選</div>
                    <div><i class="color-box" style="background: #FFD326"></i>21第二晚停車</div>
                    <div><i class="color-box" style="background: #D63E2A"></i>第三晚候選</div>
                    <div><i class="color-box" style="background: #9C2BCB"></i>21第三晚前導</div>
                    <div><i class="color-box" style="background: #72B026"></i>目標點</div>
                    <div><i class="color-box" style="background: #222222"></i>21第三晚核心</div>
                </div>
                <h4 style="margin-top:8px;">📌 圖示 / 類型說明</h4>
                <div class="grid" style="grid-template-columns: 1fr 1fr;">
                    <div><i class="icon-symbol">📍</i>2026推估點</div>
                    <div><i class="icon-symbol">⭐</i>歷年參考點</div>
                    <div style="grid-column: span 2;"><i class="icon-symbol">🅿️</i>2021停車/觀察點</div>
                </div>
            `;
            return div;
        };
        legend.addTo(map);

        // 初始化
        initRoute();
        applyFilters();

    </script>
</body>
