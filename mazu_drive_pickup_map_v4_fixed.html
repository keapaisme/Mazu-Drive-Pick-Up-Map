<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>白沙屯媽祖 2026 去程候選駐駕地圖（整合 2021 停車點版）</title>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* 基本重置與字體 */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #f4f4f9; }
        
        /* 頂部標題 */
        #header { background: #d92727; color: white; padding: 12px 15px; text-align: center; flex-shrink: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #header h1 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
        #header p { margin: 5px 0 0 0; font-size: 0.85rem; color: #ffe6e6; font-weight: bold; }

        /* 主要內容區塊 */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        /* 左側控制面板 */
        #sidebar { width: 360px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ccc; z-index: 500; }
        .sidebar-section { padding: 15px; border-bottom: 1px solid #eee; }
        .sidebar-section h2 { font-size: 1.05rem; margin: 0 0 8px 0; color: #333; display: flex; align-items: center; }
        .sidebar-section h2::before { content: "🚙"; margin-right: 5px; }
        
        /* 戰略與警語區塊 */
        .info-box { background: #eef5ff; border-left: 4px solid #0d6efd; padding: 10px; font-size: 0.85rem; color: #084298; margin-bottom: 10px; border-radius: 0 4px 4px 0; line-height: 1.5; }
        .info-box span.highlight { color: #d92727; font-weight: bold; }
        
        /* 篩選控制器 */
        .control-group { margin-bottom: 10px; }
        .control-group label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.9rem; background: #fff; }
        optgroup { font-weight: bold; color: #555; }
        .checkbox-group { display: flex; align-items: center; font-size: 0.85rem; color: #333; margin-top: 8px; cursor: pointer; }
        .checkbox-group input { margin-right: 6px; cursor: pointer; }

        /* 地點列表區塊 */
        #list-container { flex: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; background: #fafafa; }
        .list-item { padding: 12px 15px; border-bottom: 1px solid #eaeaea; cursor: pointer; transition: background 0.2s; }
        .list-item:hover { background: #eef5ff; }
        .list-item-title { font-weight: bold; font-size: 1rem; color: #222; margin-bottom: 3px; display: flex; align-items: flex-start; }
        .list-item-title .icon { margin-right: 5px; font-size: 1.1rem; }
        .list-item-tag { font-size: 0.75rem; padding: 2px 5px; border-radius: 3px; margin-bottom: 5px; display: inline-block; font-weight: bold; }
        .list-item-desc { font-size: 0.8rem; color: #666; line-height: 1.4; }

        /* 標籤顏色定義 */
        .tag-2026 { background: #ffeeba; color: #856404; }
        .tag-ref { background: #f8d7da; color: #721c24; }
        .tag-2021-1 { background: #d1ecf1; color: #0c5460; }
        .tag-2021-2 { background: #fff3cd; color: #856404; }
        .tag-2021-3p { background: #e2e3e5; color: #383d41; }
        .tag-2021-3c { background: #cce5ff; color: #004085; }

        /* 地圖區塊 */
        #map { flex: 1; height: 100%; z-index: 1; }

        /* 徽章 (Badges - 用於 Popup) */
        .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; margin-bottom: 5px; color: white; }
        .badge.parking-high { background: #28a745; }
        .badge.parking-med { background: #ffc107; color: #333; }
        .badge.parking-low { background: #6c757d; }
        .badge.night-yes { background: #17a2b8; }
        .badge.type-watch { background: #6c757d; }
        .badge.type-stay { background: #dc3545; }
        .badge.type-park { background: #0d6efd; }
        .badge.type-core { background: #212529; }

        /* Popup 內容樣式 */
        .custom-popup .popup-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 8px; }
        .custom-popup .popup-title { font-size: 1.1rem; font-weight: bold; margin: 0; color: #222; }
        .custom-popup .popup-year { font-size: 0.8rem; color: #fff; background: #d92727; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .custom-popup .popup-row { font-size: 0.85rem; margin: 4px 0; display: flex; align-items: flex-start; }
        .custom-popup .popup-row span.label { color: #666; width: 65px; flex-shrink: 0; font-weight: bold; }
        .custom-popup .badges-container { margin-top: 5px; margin-bottom: 8px; }
        .custom-popup .note { background: #f9f9f9; border-left: 3px solid #007bff; padding: 6px 8px; font-size: 0.8rem; color: #444; margin-top: 10px; line-height: 1.4; }
        
        /* 交流道路由資訊卡 (Popup 內) */
        .highway-card { background: #f1f8ff; border: 1px solid #cce5ff; border-radius: 4px; padding: 6px; margin-top: 8px; font-size: 0.8rem; }
        .highway-card.nh3 { background: #eafaf1; border-color: #b7e4c7; }
        .highway-card h4 { margin: 0 0 4px 0; font-size: 0.85rem; display: flex; align-items: center; }
        .highway-card h4 span.hw-badge { color: white; padding: 1px 4px; border-radius: 2px; margin-right: 5px; font-size: 0.7rem; }
        .hw-badge.b-nh1 { background: #0055ff; }
        .hw-badge.b-nh3 { background: #00aa00; }
        .route-data { font-weight: bold; color: #d92727; }

        /* 圖例 (Legend) */
        .legend { background: white; padding: 10px 12px; border-radius: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.2); font-size: 0.8rem; line-height: 1.6; color: #333; }
        .legend h4 { margin: 0 0 5px 0; font-size: 0.85rem; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
        .legend .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 15px; }
        .legend i.color-box { width: 12px; height: 12px; display: inline-block; margin-right: 5px; border-radius: 3px; vertical-align: middle; }
        .legend i.line-box { width: 15px; height: 3px; display: inline-block; margin-right: 5px; vertical-align: middle; }
        .legend i.icon-symbol { font-style: normal; margin-right: 3px; }

        /* RWD 手機版調整 */
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; flex: none; max-height: 45vh; border-right: none; border-bottom: 2px solid #ccc; }
            #map { flex: 1; min-height: 55vh; }
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>白沙屯媽祖 2026 去程候選駐駕地圖（整合 2021 停車點版）</h1>
        <p>⚠️ 本圖整合 2026 候選推估與 2021 停車節點，屬規劃示意用途，非官方公告，實際請依即時路線與交管調整。</p>
    </div>

    <div id="main-container">
        <!-- 左側控制面板 -->
        <div id="sidebar">
            <div class="sidebar-section" style="padding-bottom: 10px;">
                <h2>實戰觀察動線規劃</h2>
                <div class="info-box">
                    • 點擊地圖上的<b>候選區(📍)</b>，將自動計算並繪製到達最近國1/國3交流道的真實道路路徑。<br>
                    • <span class="highlight">第三晚核心帶為開車接駕優先關注區</span><br>
                    • 預設連線與距離為直線近似值，實際路況請依 Google Maps 導航為準。
                </div>
            </div>

            <div class="sidebar-section" style="background: #fdfdfd; padding-top: 10px;">
                <div class="control-group">
                    <label for="filter-select">🔍 高階資料篩選器：</label>
                    <select id="filter-select" onchange="applyFilters()">
                        <optgroup label="【基本類別】">
                            <option value="all">顯示全部圖層</option>
                            <option value="2026_only">🔵 只看 2026 候選推估點</option>
                            <option value="ref_only">⭐ 只看 歷年實際駐駕參考點</option>
                            <option value="2021_only">🅿️ 只看 2021 整合停車/觀察點</option>
                        </optgroup>
                    </select>
                </div>
                <label class="checkbox-group">
                    <input type="checkbox" id="toggle-route" checked onchange="toggleLayers()"> 顯示 2026 建議觀察軌跡帶 (灰色虛線)
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="toggle-nh1" checked onchange="toggleLayers()"> 顯示最近 國道1號 示意連線 (藍色虛線)
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="toggle-nh3" checked onchange="toggleLayers()"> 顯示最近 國道3號 示意連線 (綠色虛線)
                </label>
            </div>

            <!-- 動態生成的地點列表 -->
            <ul id="list-container"></ul>
        </div>

        <!-- 地圖容器 -->
        <div id="map"></div>
    </div>

    <!-- 引入 Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. 初始化地圖 ---
        const map = L.map('map').setView([23.95, 120.45], 10);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: '&copy; Esri, HERE, Garmin, Intermap, increment P Corp., GEBCO, USGS, METI/NASA, NGA, EPA, USDA'
        }).addTo(map);

        // --- 2. 圖層與 Marker 管理 ---
        const customIcon = (color) => new L.Icon({
            iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        // 定義不同的圖層群組，方便開關
        const markersLayer = L.featureGroup().addTo(map);
        const nh1LinesLayer = L.featureGroup().addTo(map);
        const nh3LinesLayer = L.featureGroup().addTo(map);
        const activeRoutingLayer = L.featureGroup().addTo(map); // 用於存放被點擊後的「真實道路軌跡」
        let routeLineLayer = null;
        const markerInstances = {};

        // --- 3. 交流道資料庫 (規劃示意近似值) ---
        const interchanges = {
            "nh1_houli": { name: "國1 后里交流道", lat: 24.3160, lng: 120.7060, hw: "NH1" },
            "nh1_wangtian": { name: "國1 王田交流道", lat: 24.1205, lng: 120.5900, hw: "NH1" },
            "nh1_changhua": { name: "國1 彰化交流道", lat: 24.0815, lng: 120.5180, hw: "NH1" },
            "nh1_yuanlin": { name: "國1 員林交流道", lat: 23.9785, lng: 120.5320, hw: "NH1" },
            "nh1_xiluo": { name: "國1 西螺交流道", lat: 23.8150, lng: 120.4635, hw: "NH1" },
            "nh1_huwei": { name: "國1 虎尾交流道", lat: 23.7295, lng: 120.4611, hw: "NH1" },
            "nh1_dounan": { name: "國1 斗南交流道", lat: 23.6800, lng: 120.4650, hw: "NH1" },
            "nh3_dajia": { name: "國3 大甲交流道", lat: 24.3312, lng: 120.6405, hw: "NH3" },
            "nh3_shalu": { name: "國3 沙鹿交流道", lat: 24.2375, lng: 120.5758, hw: "NH3" },
            "nh3_longjing": { name: "國3 龍井交流道", lat: 24.1950, lng: 120.5550, hw: "NH3" },
            "nh3_hemei": { name: "國3 和美交流道", lat: 24.1160, lng: 120.5050, hw: "NH3" },
            "nh3_gukeng": { name: "國3 古坑系統", lat: 23.6300, lng: 120.5600, hw: "NH3" } // 雲林段國3較遠
        };

        // --- 4. 地點資料庫 (整合最近交流道參考) ---
        const locations = [
            // 第一晚 (藍色)
            { id: "p1", name: "大甲區 (行政中心)", lat: 24.3486, lng: 120.6224, group: "2026候選區", tactical_group: "第一晚候選", day: "day1", color: "blue", isRef: false, is2021: false,
              parking: "高", interchange: "國三 大甲交流道 約10分", night_wait: "是", type: "純觀察區塊", note: "腹地較廣，適合外圍停車後步行。", 
              near_nh1: "nh1_houli", near_nh3: "nh3_dajia" },
            { id: "p2", name: "清水區 (行政中心)", lat: 24.2678, lng: 120.5746, group: "2026候選區", tactical_group: "第一晚候選", day: "day1", color: "blue", isRef: false, is2021: false,
              parking: "中", interchange: "國四 轉 國三", night_wait: "是", type: "純觀察區塊", note: "建議提早於台1線周邊尋找空地。",
              near_nh1: "nh1_wangtian", near_nh3: "nh3_shalu" },
            { id: "p3", name: "沙鹿區 (行政中心)", lat: 24.2332, lng: 120.5624, group: "2026候選區", tactical_group: "第一晚候選", day: "day1", color: "blue", isRef: false, is2021: false,
              parking: "低", interchange: "國三 沙鹿交流道", night_wait: "否", type: "純觀察區塊", note: "沙鹿市區道路狹小，強烈建議避開中心點停放。",
              near_nh1: "nh1_wangtian", near_nh3: "nh3_shalu" },
            
            // 第二晚 (橘色)
            { id: "p5", name: "花壇鄉 (行政中心)", lat: 24.0255, lng: 120.5393, group: "2026候選區", tactical_group: "第二晚候選", day: "day2", color: "orange", isRef: false, is2021: false,
              parking: "中", interchange: "台74甲線 周邊銜接", night_wait: "是", type: "純觀察區塊", note: "台1線沿路多腹地，需注意臨停安全。",
              near_nh1: "nh1_changhua", near_nh3: "nh3_hemei" },
            { id: "p6", name: "員林市 (行政中心)", lat: 23.9592, lng: 120.5739, group: "2026候選區", tactical_group: "第二晚候選", day: "day2", color: "orange", isRef: false, is2021: false,
              parking: "中", interchange: "台76線 轉 國一", night_wait: "是", type: "駐駕候選", note: "生活機能極佳，夜間等候首選。",
              near_nh1: "nh1_yuanlin", near_nh3: "nh3_hemei" },

            // 第三晚 (紅色)
            { id: "p8", name: "虎尾鎮 (行政中心)", lat: 23.7082, lng: 120.4433, group: "2026候選區", tactical_group: "第三晚候選", day: "day3", color: "red", isRef: false, is2021: false,
              parking: "高", interchange: "國一 虎尾交流道 約10分", night_wait: "是", type: "駐駕候選", note: "雲林重要樞紐，撤離動線多。",
              near_nh1: "nh1_huwei", near_nh3: "nh3_gukeng" },
            { id: "p9", name: "土庫鎮 (行政中心)", lat: 23.6766, lng: 120.3925, group: "2026候選區", tactical_group: "第三晚候選", day: "day3", color: "red", isRef: false, is2021: false,
              parking: "中", interchange: "台78線 轉 國一", night_wait: "是", type: "純觀察區塊", note: "圓環周邊易打結，建議停交流道空地。",
              near_nh1: "nh1_dounan", near_nh3: "nh3_gukeng" },
            { id: "p10", name: "褒忠鄉 (行政中心)", lat: 23.7153, lng: 120.3138, group: "2026候選區", tactical_group: "第三晚候選", day: "day3", color: "red", isRef: false, is2021: false,
              parking: "中", interchange: "台78線 轉 國一", night_wait: "否", type: "駐駕候選", note: "進北港前最後防線，鄉道窄。",
              near_nh1: "nh1_huwei", near_nh3: "nh3_gukeng" },

            // 歷年與2021點位 (省略 near_nh1 屬性，避免畫面過度混亂，僅為主要候選區畫線)
            { id: "p4", name: "福宴國際創意美食", lat: 24.2709, lng: 120.5644, group: "歷年參考點", tactical_group: "歷年第一晚參考", day: "day1", color: "blue", isRef: true, is2021: false, parking: "高", interchange: "台1線旁", night_wait: "是", type: "歷年參考點", note: "2020實際駐駕點。" },
            { id: "p13", name: "北港朝天宮", lat: 23.5681, lng: 120.3019, group: "目標點", tactical_group: "進香目的地", day: "target", color: "green", isRef: false, is2021: false, parking: "低", interchange: "台78 再轉 台19", night_wait: "是", type: "終點", note: "請停外圍付費停車場。" },
            { id: "p21_15", name: "西螺延平老街免費停車場", lat: 23.8038846, lng: 120.461831, group: "2021停車點", tactical_group: "第三晚前導停車點", day: "day3_pre_2021", color: "violet", isRef: false, is2021: true, parking: "高", interchange: "老街外圍動線", night_wait: "是", type: "核心接駕點", note: "強烈建議開車族利用。" },
            { id: "p21_21", name: "元長鄉停一停車場", lat: 23.651147, lng: 120.3133899, group: "2021停車點", tactical_group: "第三晚核心停車點", day: "day3_core_2021", color: "black", isRef: false, is2021: true, parking: "高", interchange: "台19線前哨", night_wait: "需確認", type: "停車點", note: "進入北港前最後大型腹地。" }
        ];

        // --- 5. 繪製建議觀察帶 (灰色虛線) ---
        const routeCoords = [ [24.3486, 120.6224], [24.2678, 120.5746], [23.9592, 120.5739], [23.7082, 120.4433], [23.7153, 120.3138], [23.5681, 120.3019] ];
        routeLineLayer = L.polyline(routeCoords, { color: '#666', weight: 4, dashArray: '8, 12', opacity: 0.6 })
            .bindPopup("<b>🚙 2026 建議觀察軌跡帶</b><br>非絕對路線，僅表示大方向收斂趨勢。").addTo(map);

        // --- 6. 繪製預設交流道示意連線 (直線) ---
        function drawInterchangeConnections() {
            nh1LinesLayer.clearLayers();
            nh3LinesLayer.clearLayers();

            locations.forEach(loc => {
                if (loc.near_nh1 && interchanges[loc.near_nh1]) {
                    const ic = interchanges[loc.near_nh1];
                    L.polyline([[loc.lat, loc.lng], [ic.lat, ic.lng]], { color: '#0055ff', weight: 2, dashArray: '5, 5', opacity: 0.4 })
                     .bindPopup(`示意連線：${loc.name} ↔ ${ic.name}`).addTo(nh1LinesLayer);
                }
                if (loc.near_nh3 && interchanges[loc.near_nh3]) {
                    const ic = interchanges[loc.near_nh3];
                    L.polyline([[loc.lat, loc.lng], [ic.lat, ic.lng]], { color: '#00aa00', weight: 2, dashArray: '5, 5', opacity: 0.4 })
                     .bindPopup(`示意連線：${loc.name} ↔ ${ic.name}`).addTo(nh3LinesLayer);
                }
            });
        }

        function toggleLayers() {
            document.getElementById('toggle-route').checked ? map.addLayer(routeLineLayer) : map.removeLayer(routeLineLayer);
            document.getElementById('toggle-nh1').checked ? map.addLayer(nh1LinesLayer) : map.removeLayer(nh1LinesLayer);
            document.getElementById('toggle-nh3').checked ? map.addLayer(nh3LinesLayer) : map.removeLayer(nh3LinesLayer);
        }

        // --- 7. OSRM 真實道路路由引擎 (Hybrid 處理) ---
        // 呼叫開源 OSRM API 計算真實路徑與時間
        async function fetchRealRoute(startLat, startLng, endLat, endLng, domId, hwName, color) {
            try {
                // OSRM API 格式: lng,lat;lng,lat
                const url = `https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${endLng},${endLat}?overview=full&geometries=geojson`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.code === 'Ok') {
                    const route = data.routes[0];
                    const distKm = (route.distance / 1000).toFixed(1);
                    const timeMin = Math.round(route.duration / 60);

                    // 1. 更新 Popup 內的 DOM 顯示真實數據
                    const domEl = document.getElementById(domId);
                    if (domEl) {
                        domEl.innerHTML = `${distKm} km (約 ${timeMin} 分鐘)`;
                        domEl.style.color = "#d92727"; // 變成紅色表示取得真實數據
                    }

                    // 2. 在地圖上畫出真實道路軌跡 (高亮顯示)
                    L.geoJSON(route.geometry, {
                        style: { color: color, weight: 5, opacity: 0.8 }
                    }).addTo(activeRoutingLayer);
                }
            } catch (error) {
                console.log("OSRM Routing failed, falling back to straight line.", error);
                const domEl = document.getElementById(domId);
                if (domEl) domEl.innerHTML += " (路徑計算失敗)";
            }
        }

        // --- 8. Popup 生成與事件綁定 ---
        function generatePopupContent(loc) {
            let iconStr = loc.isRef ? "⭐" : (loc.is2021 ? "🅿️" : (loc.day === 'target' ? "🎯" : "📍"));
            let parkingBadge = loc.parking === "高" ? "parking-high" : (loc.parking === "中" ? "parking-med" : "parking-low");
            let yearTag = loc.is2021 ? "2021 紀錄" : (loc.isRef ? "歷年紀錄" : "2026 推估");

            let html = `
                <div class="custom-popup">
                    <div class="popup-header"><span class="popup-year">${yearTag}</span></div>
                    <h3 class="popup-title">${iconStr} ${loc.name}</h3>
                    <div class="badges-container">
                        <span class="badge ${parkingBadge}">🅿️ 停車${loc.parking}</span>
                        <span class="badge type-watch">${loc.tactical_group}</span>
                    </div>
            `;

            // 如果有設定交流道，則加入交流道卡片 UI
            if (loc.near_nh1 || loc.near_nh3) {
                if (loc.near_nh1) {
                    let ic1 = interchanges[loc.near_nh1];
                    // 計算直線距離作為預設值
                    let straightDist1 = (map.distance([loc.lat, loc.lng], [ic1.lat, ic1.lng]) / 1000).toFixed(1);
                    html += `
                        <div class="highway-card">
                            <h4><span class="hw-badge b-nh1">國 1</span> ${ic1.name}</h4>
                            <div>道路計算：<span id="route-nh1-${loc.id}" class="route-data">直線約 ${straightDist1} km...</span></div>
                        </div>
                    `;
                }
                if (loc.near_nh3) {
                    let ic3 = interchanges[loc.near_nh3];
                    let straightDist3 = (map.distance([loc.lat, loc.lng], [ic3.lat, ic3.lng]) / 1000).toFixed(1);
                    html += `
                        <div class="highway-card nh3">
                            <h4><span class="hw-badge b-nh3">國 3</span> ${ic3.name}</h4>
                            <div>道路計算：<span id="route-nh3-${loc.id}" class="route-data">直線約 ${straightDist3} km...</span></div>
                        </div>
                    `;
                }
            }

            html += `<div class="note"><b>💡 規劃：</b>${loc.note}</div></div>`;
            return html;
        }

        // 點擊列表或 Marker 時觸發：飛到該點 -> 打開 Popup -> 呼叫 OSRM 畫真實路線
        function focusMap(id) {
            const loc = locations.find(l => l.id === id);
            const marker = markerInstances[id];
            if (marker && loc) {
                map.setView(marker.getLatLng(), 13, { animate: true });
                marker.openPopup();
                triggerRouting(loc);
            }
        }

        function triggerRouting(loc) {
            // 清除前一次的真實路徑
            activeRoutingLayer.clearLayers();
            
            // 淡化背景的直線示意圖
            nh1LinesLayer.setStyle({ opacity: 0.1 });
            nh3LinesLayer.setStyle({ opacity: 0.1 });

            // 呼叫 OSRM 獲取真實道路並畫在地圖上
            if (loc.near_nh1) {
                const ic = interchanges[loc.near_nh1];
                fetchRealRoute(loc.lat, loc.lng, ic.lat, ic.lng, `route-nh1-${loc.id}`, ic.name, '#0055ff');
            }
            if (loc.near_nh3) {
                const ic = interchanges[loc.near_nh3];
                fetchRealRoute(loc.lat, loc.lng, ic.lat, ic.lng, `route-nh3-${loc.id}`, ic.name, '#00aa00');
            }
        }

        // --- 9. 核心渲染邏輯 (結合篩選) ---
        function applyFilters() {
            markersLayer.clearLayers();
            activeRoutingLayer.clearLayers();
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = '';

            const filterVal = document.getElementById('filter-select').value;

            locations.forEach(loc => {
                let match = false;
                if (filterVal === 'all') match = true;
                else if (filterVal === '2026_only' && loc.group === '2026候選區') match = true;
                else if (filterVal === 'ref_only' && loc.isRef) match = true;
                else if (filterVal === '2021_only' && loc.is2021) match = true;

                if (match) {
                    const marker = L.marker([loc.lat, loc.lng], { icon: customIcon(loc.color) })
                        .bindPopup(generatePopupContent(loc));
                    
                    // 綁定點擊事件觸發 OSRM 路由
                    marker.on('click', () => triggerRouting(loc));
                    
                    markersLayer.addLayer(marker);
                    markerInstances[loc.id] = marker;

                    let iconStr = loc.isRef ? "⭐" : (loc.is2021 ? "🅿️" : (loc.day === 'target' ? "🎯" : "📍"));
                    let tagClass = loc.group === '2026候選區' ? 'tag-2026' : (loc.is2021 ? 'tag-2021-3p' : 'tag-ref');
                    let li = document.createElement('li');
                    li.className = 'list-item';
                    li.onclick = () => focusMap(loc.id);
                    li.innerHTML = `
                        <div class="list-item-title"><span class="icon">${iconStr}</span> ${loc.name}</div>
                        <span class="list-item-tag ${tagClass}">[${loc.tactical_group}]</span>
                        <div class="list-item-desc">🅿️停車: ${loc.parking} | 屬性: ${loc.type}</div>
                    `;
                    listContainer.appendChild(li);
                }
            });

            // 恢復直線示意圖的透明度
            nh1LinesLayer.setStyle({ opacity: 0.4 });
            nh3LinesLayer.setStyle({ opacity: 0.4 });
        }

        // --- 10. 加入高階地圖圖例 (Legend) ---
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>🎨 圖層 / 連線說明</h4>
                <div class="grid" style="grid-template-columns: 1fr;">
                    <div><i class="line-box" style="background: #0055ff;"></i>國1 交流道動線</div>
                    <div><i class="line-box" style="background: #00aa00;"></i>國3 交流道動線</div>
                    <div><i class="line-box" style="background: #666; border-top: 2px dashed #ccc;"></i>2026 觀察軌跡帶</div>
                </div>
                <h4 style="margin-top:8px;">📌 標記點</h4>
                <div class="grid" style="grid-template-columns: 1fr 1fr;">
                    <div><i class="icon-symbol">📍</i>候選推估</div>
                    <div><i class="icon-symbol">⭐</i>歷年參考</div>
                    <div style="grid-column: span 2;"><i class="icon-symbol">🅿️</i>2021停車/觀察</div>
                </div>
            `;
            return div;
        };
        legend.addTo(map);

        // 初始化
        drawInterchangeConnections();
        applyFilters();

        // 點擊地圖空白處時，清除高亮軌跡並恢復直線透明度
        map.on('click', function(e) {
            activeRoutingLayer.clearLayers();
            nh1LinesLayer.setStyle({ opacity: 0.4 });
            nh3LinesLayer.setStyle({ opacity: 0.4 });
        });

    </script>
</body>
</html>
